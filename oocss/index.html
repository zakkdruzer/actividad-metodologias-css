    <div class="alert is-success">
      <strong class="alert__title">Guardado con éxito</strong>
      <p class="alert__message">Tu perfil se actualizó correctamente.</p>
    </div>
  </div>
</section>

<main class="page">
  <section class="container-narrow">
    <h1>Sistema de avisos (OOCSS)</h1>

    <div class="alert is-warning">
      <strong class="alert__title">Cuidado</strong>
      <p class="alert__message">Estás a punto de sobrescribir datos.</p>
    </div>

    <div class="alert is-error">
      <strong class="alert__title">Algo salió mal</strong>
      <p class="alert__message">No se pudo guardar la información.</p>
    </div>

    <div class="alert is-info">
      <strong class="alert__title">Dato interesante</strong>
      <p class="alert__message">
        Puedes deshacer esta acción en los próximos 5 minutos.
      </p>
    </div>

    <div class="chip-row">
      <span class="chip is-success">Activo</span>
      <span class="chip is-warning">Pendiente</span>
      <span class="chip is-error">Fallido</span>
      <span class="chip is-info">Info</span>
    </div>
  </section>
